name: admin_frontend
description: "The admin panel for BetterSuite on-demand platform"
publish_to: "none"

version: 1.3.39+79

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0 <4.0.0"

dependencies:
  sentry_flutter: ^9.8.0
  flutter:
    sdk: flutter

  freezed_annotation: ^3.1.0

  # Geo
  latlong2: ^0.9.1
  geolocator: ^14.0.2

  # Localization
  better_localization:
    path: ../../libs/flutter_localizations
  intl: any

  # State management
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^10.1.1

  # Dependency injection
  get_it: ^9.1.1
  injectable: ^2.7.0

  # Routing
  auto_route: ^10.3.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_dotenv: ^6.0.0

  # Helpers
  dartz: ^0.10.1
  rxdart: ^0.28.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  file_picker: ^10.3.7
  logger: ^2.6.2
  form_builder_validators: ^11.2.0

  # Firebase
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4

  # UI
  fl_chart: ^1.1.1
  generic_map: ^0.10.3
  lottie: ^3.3.2

  # Network
  graphql: ^5.2.3
  cached_network_image: ^3.4.1
  collection: ^1.19.1
  dotted_line: ^3.2.3
  package_info_plus: ^8.3.1
  super_drag_and_drop: ^0.9.1
  skeletonizer: ^2.1.0+1
  flutter_staggered_grid_view: ^0.7.0
  timeago: ^3.7.1
  flutter_map_tile_caching: ^10.1.1
  flutter_layout_grid: ^2.0.8
  api_response: ^0.2.3
  better_design_system:
    path: ../../libs/better_design_system
  better_assets:
    path: ../../libs/better_design_system/assets
  better_icons:
    path: ../../libs/better_design_system/better_icons

  image_faker: ^0.1.0
  time: ^2.1.5
  dart_jsonwebtoken: ^3.3.1
  dio: ^5.9.0
  gql_dio_link: ^2.0.0
  sentry_link: ^9.8.0
  sentry_dio: ^9.8.0

dev_dependencies:
  sentry_dart_plugin: ^3.2.0
  auto_route_generator: ^10.2.6
  build_runner: ^2.10.4
  flutter_gen_runner: ^5.12.0
  flutter_gen: ^5.12.0
  flutter_lints: ^6.0.0
  injectable_generator: ^2.9.0
  graphql_codegen: ^3.0.0
  freezed: ^3.2.3
  # json_serializable: ^6.9.5 # We have disabled this for now until build_runner offers a better performance for combining builds https://github.com/dart-lang/build/issues/3803
  flutter_launcher_icons: ^0.14.4
  import_sorter: ^4.6.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env.dev
    - .env.prod
    - assets/images/
    - assets/lottie/

flutter_gen:
  integrations:
    lottie: true
  assets:
    exclude:
      - .env.dev
      - .env.prod

import_sorter:
  emojis: false
  comments: false
  ignored_files: []

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: lumeagency
