query shopPayoutSession($id: ID!) {
  shopPayoutSession(id: $id) {
    ...shopPayoutSessionDetail
  }
}

query shopPayoutSessionPayoutMethodShopTransactions(
  $payoutSessionPayoutMethodId: ID!
  $paging: OffsetPaging
) {
  shopTransactions(
    filter: { payoutSessionMethodId: { eq: $payoutSessionPayoutMethodId } }
    paging: $paging
  ) {
    pageInfo {
      ...OffsetPageInfo
    }
    totalCount
    nodes {
      ...shopTransactionPayout
    }
  }
}

mutation shopAutomaticPayout($payoutSessionId: ID!, $payoutMethodId: ID!) {
  runShopAutoPayout(
    input: {
      payoutMethodId: $payoutMethodId
      payoutSessionId: $payoutSessionId
    }
  )
}

mutation shopExportPayoutToCSV($payoutSessionId: ID!, $payoutMethodId: ID!) {
  exportShopPayoutSessionToCsv(
    input: {
      payoutMethodId: $payoutMethodId
      payoutSessionId: $payoutSessionId
    }
  )
}

mutation updateShopPayoutSessionStatus(
  $id: ID!
  $status: PayoutSessionStatus!
) {
  updateOneShopPayoutSession(input: { id: $id, update: { status: $status } }) {
    ...shopPayoutSessionDetail
  }
}
