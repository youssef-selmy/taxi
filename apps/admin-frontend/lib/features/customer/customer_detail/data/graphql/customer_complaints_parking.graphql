query customerComplaintsParking(
  $filter: ParkingSupportRequestFilter!
  $paging: OffsetPaging
  $sorting: [ParkingSupportRequestSort!]
) {
  parkingSupportRequests(paging: $paging, filter: $filter, sorting: $sorting) {
    nodes {
      ...parkingSupportRequest
    }
    pageInfo {
      ...OffsetPageInfo
    }
    totalCount
  }
}
