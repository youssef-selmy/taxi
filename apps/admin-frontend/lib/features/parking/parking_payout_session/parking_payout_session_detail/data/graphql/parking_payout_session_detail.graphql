query parkingPayoutSession($id: ID!) {
  parkingPayoutSession(id: $id) {
    ...parkingPayoutSessionDetail
  }
}

query parkingPayoutSessionPayoutMethodParkingTransactions(
  $payoutSessionPayoutMethodId: ID!
  $paging: OffsetPaging
) {
  parkingTransactions(
    filter: { payoutSessionMethodId: { eq: $payoutSessionPayoutMethodId } }
    paging: $paging
  ) {
    pageInfo {
      ...OffsetPageInfo
    }
    totalCount
    nodes {
      ...parkingTransactionPayout
    }
  }
}

mutation parkingAutomaticPayout($payoutSessionId: ID!, $payoutMethodId: ID!) {
  runParkingAutoPayout(
    input: {
      payoutMethodId: $payoutMethodId
      payoutSessionId: $payoutSessionId
    }
  )
}

mutation parkingExportPayoutToCSV($payoutSessionId: ID!, $payoutMethodId: ID!) {
  exportParkingPayoutSessionToCsv(
    input: {
      payoutMethodId: $payoutMethodId
      payoutSessionId: $payoutSessionId
    }
  )
}

mutation updateParkingPayoutSessionStatus(
  $id: ID!
  $status: PayoutSessionStatus!
) {
  updateOneParkingPayoutSession(
    input: { id: $id, update: { status: $status } }
  ) {
    ...parkingPayoutSessionDetail
  }
}
