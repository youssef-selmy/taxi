fragment shopSupportRequestDetail on ShopSupportRequest {
  id
  subject
  createdAt
  status
  content
  cart {
    shop {
      ...shopBasicInfo
    }
  }
  order {
    id
    customer {
      ...CustomerCompact
    }
    carts {
      shop {
        ...shopBasicInfo
      }
    }
  }
  requestedByShop

  activities {
    ...shopSupportRequestActivity
  }

  assignedToStaffs {
    ...staffListItem
  }
}

fragment shopSupportRequestActivity on ShopSupportRequestActivity {
  id
  type
  comment
  actor {
    ...staffListItem
  }
  statusFrom
  statusTo
  assignedToStaffs {
    ...staffListItem
  }
  createdAt
  assignedToStaffs {
    ...staffListItem
  }

  unassignedFromStaffs {
    ...staffListItem
  }
}
