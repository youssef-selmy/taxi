fragment shopSupportRequest on ShopSupportRequest {
  id
  subject
  content
  status
  createdAt
  status
  orderId
  requestedByShop
  cart {
    shop {
      ...shopBasicInfo
    }
  }
  order {
    customer {
      ...CustomerCompact
    }
    carts {
      shop {
        ...shopBasicInfo
      }
    }
  }
  assignedToStaffs {
    ...staffListItem
  }
}

