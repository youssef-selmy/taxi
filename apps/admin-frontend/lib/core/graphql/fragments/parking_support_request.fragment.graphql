fragment parkingSupportRequest on ParkingSupportRequest {
  id
  subject
  content
  status
  createdAt
  status
  parkOrder {
    id
    carOwner {
      ...CustomerCompact
    }
    spotOwner {
      ...CustomerCompact
    }
  }
  content
  requestedByOwner
  assignedToStaffs {
    ...staffListItem
  }
}

