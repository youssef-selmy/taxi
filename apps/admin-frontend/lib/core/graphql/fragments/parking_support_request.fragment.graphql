fragment parkingSupportRequestDetail on ParkingSupportRequest {
  id
  subject
  createdAt
  status
  parkOrderId
  content
  parkOrder {
    id
    carOwner {
      ...CustomerCompact
    }
    spotOwner {
      ...CustomerCompact
    }
  }
  requestedByOwner

  activities {
    ...parkingSupportRequestActivity
  }

  assignedToStaffs {
    ...staffListItem
  }
}

fragment parkingSupportRequestActivity on ParkingSupportRequestActivity {
  id
  type
  comment
  actor {
    ...staffListItem
  }
  statusFrom
  statusTo
  assignedToStaffs {
    ...staffListItem
  }
  createdAt
  assignedToStaffs {
    ...staffListItem
  }

  unassignedFromStaffs {
    ...staffListItem
  }
}
