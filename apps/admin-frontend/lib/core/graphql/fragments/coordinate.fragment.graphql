fragment Coordinate on Point {
  lat
  lng
  heading
}

fragment Place on PlaceDTO {
  address
  point {
    ...Coordinate
  }
  title
}

fragment Waypoint on WaypointBase {
  __typename
  location {
    ...Coordinate
  }
  address
  role
  ... on RideWaypoint {
    ...RideWaypoint
  }
  ... on DeliveryWaypoint {
    ...DeliveryWaypoint
  }
  ... on ShopWaypoint {
    ...ShopWaypoint
  }
}

fragment RideWaypoint on RideWaypoint {
  location {
    ...Coordinate
  }
  address
}
fragment DeliveryWaypoint on DeliveryWaypoint {
  location {
    ...Coordinate
  }
  address
  deliveryContact {
    name
    companyName
    addressLine1
    phoneNumber {
      countryCode
      number
    }
  }
}
fragment ShopWaypoint on ShopWaypoint {
  location {
    ...Coordinate
  }
  address
  shopName
  shopImageUrl
}
