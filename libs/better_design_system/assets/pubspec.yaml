name: better_assets
description: "A new Flutter package project."
version: 0.0.1

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: "^3.29.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.0
  lottie: ^3.3.1

dev_dependencies:
  flutter_gen_runner: ^5.12.0
  flutter_gen: ^5.12.0
  build_runner: ^2.10.0

flutter_gen:
  assets:
    outputs:
      package_parameter_enabled: true
  integrations:
    flutter_svg: true
  fonts:
    outputs:
      package_parameter_enabled: true
      class_name: BetterFonts

flutter:
  assets:
    - images/avatars/
    - images/payment_methods/
    - images/brands/
    - images/shapes/
    - images/icons_twotone/
    - images/card_backgrounds/
    - images/empty_states/
    - images/map_previews/
    - images/markers/
    - images/clothes/
    - images/countries/
    - images/cars/
    - images/others/

  fonts:
    - family: GeneralSans
      fonts:
        - asset: fonts/generalsansextralight.ttf
          weight: 200
        - asset: fonts/generalsanslight.ttf
          weight: 300
        - asset: fonts/generalsansregular.ttf
          weight: 400
        - asset: fonts/generalsansmedium.ttf
          weight: 500
        - asset: fonts/generalsanssemibold.ttf
          weight: 600
        - asset: fonts/generalsansbold.ttf
          weight: 700

    - family: Inter
      fonts:
        - asset: fonts/interthin.ttf
          weight: 100
        - asset: fonts/interextralight.ttf
          weight: 200
        - asset: fonts/interlight.ttf
          weight: 300
        - asset: fonts/interregular.ttf
          weight: 400
        - asset: fonts/intermedium.ttf
          weight: 500
        - asset: fonts/intersemibold.ttf
          weight: 600
        - asset: fonts/interbold.ttf
          weight: 700
        - asset: fonts/interextrabold.ttf
          weight: 800
        - asset: fonts/interblack.ttf
          weight: 900
